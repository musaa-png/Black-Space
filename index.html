<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎬 TERROR VAULT - Terrifying Horror Movies 🎬</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a0000 50%, #0a0a0a 100%);
            color: #e0e0e0;
            line-height: 1.6;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Animated background effect */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 50%, rgba(139, 0, 0, 0.1) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(75, 0, 130, 0.1) 0%, transparent 50%);
            pointer-events: none;
            z-index: -1;
        }

        header {
            background: linear-gradient(90deg, rgba(0, 0, 0, 0.9) 0%, rgba(80, 0, 0, 0.7) 50%, rgba(0, 0, 0, 0.9) 100%);
            padding: 30px 20px;
            text-align: center;
            border-bottom: 3px solid #8b0000;
            box-shadow: 0 0 20px rgba(139, 0, 0, 0.5), inset 0 0 20px rgba(139, 0, 0, 0.2);
            position: relative;
            overflow: hidden;
        }

        header::before {
            content: '🔥 💀 🔥';
            position: absolute;
            top: 5px;
            left: 0;
            right: 0;
            font-size: 20px;
            opacity: 0.3;
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        h1 {
            font-size: 2.5em;
            color: #ff1744;
            text-shadow: 0 0 10px #ff1744, 0 0 20px #8b0000, 0 0 30px #4b0082;
            font-weight: bold;
            letter-spacing: 3px;
            margin-bottom: 10px;
            animation: glow 3s ease-in-out infinite;
        }

        @keyframes glow {
            0%, 100% { text-shadow: 0 0 10px #ff1744, 0 0 20px #8b0000, 0 0 30px #4b0082; }
            50% { text-shadow: 0 0 20px #ff1744, 0 0 30px #8b0000, 0 0 40px #4b0082, 0 0 50px #ff1744; }
        }

        .tagline {
            color: #b0bec5;
            font-size: 1.1em;
            font-style: italic;
            letter-spacing: 2px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 30px 20px;
        }

        /* Search Section */
        .search-section {
            margin-bottom: 40px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
        }

        .search-input {
            padding: 12px 20px;
            border: 2px solid #8b0000;
            background: rgba(20, 20, 20, 0.8);
            color: #e0e0e0;
            border-radius: 5px;
            font-size: 1em;
            min-width: 300px;
            transition: all 0.3s;
            box-shadow: 0 0 10px rgba(139, 0, 0, 0.3);
        }

        .search-input:focus {
            outline: none;
            border-color: #ff1744;
            box-shadow: 0 0 20px rgba(255, 23, 68, 0.5), inset 0 0 10px rgba(139, 0, 0, 0.2);
            background: rgba(40, 20, 20, 0.9);
        }

        .search-input::placeholder {
            color: #666;
        }

        .btn {
            padding: 12px 25px;
            border: 2px solid #ff1744;
            background: linear-gradient(135deg, #8b0000 0%, #4b0082 100%);
            color: #fff;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            font-weight: bold;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 0 10px rgba(255, 23, 68, 0.3);
        }

        .btn:hover {
            background: linear-gradient(135deg, #ff1744 0%, #8b0000 100%);
            box-shadow: 0 0 20px rgba(255, 23, 68, 0.6), 0 0 30px rgba(75, 0, 130, 0.4);
            transform: scale(1.05);
        }

        .btn:active {
            transform: scale(0.95);
        }

        .btn-secondary {
            padding: 8px 15px;
            font-size: 0.9em;
            background: linear-gradient(135deg, #4b0082 0%, #1a0033 100%);
            border-color: #4b0082;
        }

        .btn-secondary:hover {
            background: linear-gradient(135deg, #6b0fb2 0%, #2a0052 100%);
            box-shadow: 0 0 15px rgba(107, 15, 178, 0.6);
        }

        /* Movies Grid */
        .movies-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 25px;
            margin-bottom: 40px;
        }

        .movie-card {
            background: linear-gradient(135deg, rgba(30, 20, 40, 0.8) 0%, rgba(50, 10, 30, 0.8) 100%);
            border: 2px solid #8b0000;
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 0 15px rgba(139, 0, 0, 0.3), inset 0 0 10px rgba(255, 23, 68, 0.1);
            position: relative;
        }

        .movie-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(45deg, transparent 30%, rgba(255, 23, 68, 0.1) 50%, transparent 70%);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .movie-card:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 0 30px rgba(255, 23, 68, 0.6), 0 0 50px rgba(75, 0, 130, 0.3);
            border-color: #ff1744;
        }

        .movie-card:hover::before {
            opacity: 1;
        }

        .movie-poster {
            width: 100%;
            height: 280px;
            background: linear-gradient(135deg, #2a1540 0%, #1a0a30 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 80px;
            color: rgba(255, 23, 68, 0.3);
            border-bottom: 2px solid #8b0000;
            overflow: hidden;
            position: relative;
        }

        .movie-poster img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .movie-info {
            padding: 15px;
        }

        .movie-title {
            font-size: 1.1em;
            font-weight: bold;
            color: #ff1744;
            margin-bottom: 8px;
            text-shadow: 0 0 5px rgba(255, 23, 68, 0.5);
        }

        .movie-year {
            font-size: 0.9em;
            color: #b0bec5;
            margin-bottom: 8px;
        }

        .movie-rating {
            color: #ffd700;
            font-size: 0.95em;
            margin-bottom: 10px;
        }

        .movie-rating span {
            margin-right: 3px;
        }

        .view-details-btn {
            width: 100%;
            padding: 8px;
            margin-top: 10px;
            font-size: 0.9em;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(5px);
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            background: linear-gradient(135deg, rgba(20, 0, 30, 0.95) 0%, rgba(40, 0, 40, 0.95) 100%);
            margin: 5% auto;
            padding: 30px;
            border: 3px solid #8b0000;
            border-radius: 10px;
            max-width: 800px;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 0 40px rgba(255, 23, 68, 0.4), 0 0 60px rgba(75, 0, 130, 0.3);
            animation: slideIn 0.3s;
        }

        @keyframes slideIn {
            from { transform: translateY(-50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .close-modal {
            color: #ff1744;
            float: right;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .close-modal:hover {
            color: #ffffff;
            text-shadow: 0 0 10px #ff1744;
        }

        .modal-header {
            border-bottom: 2px solid #8b0000;
            margin-bottom: 20px;
            padding-bottom: 15px;
        }

        .modal-header h2 {
            color: #ff1744;
            text-shadow: 0 0 5px rgba(255, 23, 68, 0.5);
            margin-bottom: 5px;
        }

        .modal-section {
            margin: 20px 0;
        }

        .modal-section h3 {
            color: #4b0082;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-left: 3px solid #ff1744;
            padding-left: 10px;
        }

        .modal-section p {
            line-height: 1.8;
            color: #d0d0d0;
        }

        .links-container {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 15px;
        }

        .link-btn {
            flex: 1;
            min-width: 150px;
            padding: 10px;
            background: linear-gradient(135deg, #2a0052 0%, #4b0082 100%);
            color: #fff;
            border: 2px solid #4b0082;
            border-radius: 5px;
            text-decoration: none;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }

        .link-btn:hover {
            background: linear-gradient(135deg, #4b0082 0%, #6b0fb2 100%);
            box-shadow: 0 0 15px rgba(107, 15, 178, 0.6);
            border-color: #6b0fb2;
        }

        /* No results message */
        .no-results {
            text-align: center;
            padding: 60px 20px;
            font-size: 1.3em;
            color: #8b0000;
            text-shadow: 0 0 10px rgba(139, 0, 0, 0.5);
        }

        .no-results::before {
            content: '👻';
            display: block;
            font-size: 4em;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        /* Scrollbar styling */
        ::-webkit-scrollbar {
            width: 10px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(20, 20, 20, 0.5);
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, #8b0000 0%, #4b0082 100%);
            border-radius: 5px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(180deg, #ff1744 0%, #6b0fb2 100%);
        }

        /* Responsive */
        @media (max-width: 768px) {
            h1 {
                font-size: 1.8em;
            }

            .search-input {
                min-width: 100%;
            }

            .movies-grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
                gap: 15px;
            }

            .modal-content {
                margin: 20% auto;
                padding: 20px;
            }
        }

        footer {
            text-align: center;
            padding: 20px;
            border-top: 2px solid #8b0000;
            color: #666;
            margin-top: 40px;
        }
    </style>
</head>
<body>
    <header>
        <h1>🎬 TERROR VAULT 🎬</h1>
        <p class="tagline">Enter the Realm of Pure Nightmare Fuel</p>
    </header>

    <div class="container">
        <!-- Search Section -->
        <div class="search-section">
            <input 
                type="text" 
                id="searchInput" 
                class="search-input" 
                placeholder="Search for terrifying horror movies... 🔍"
            >
            <button class="btn" onclick="searchMovies()">SEARCH</button>
            <button class="btn btn-secondary" onclick="resetSearch()">RESET</button>
        </div>

        <!-- Movies Grid -->
        <div id="moviesContainer" class="movies-grid"></div>

        <!-- No Results Message -->
        <div id="noResults" class="no-results" style="display: none;">
            No terrifying movies found. Try a different search!
        </div>
    </div>

    <!-- Movie Details Modal -->
    <div id="movieModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal()">&times;</span>
            <div class="modal-header">
                <h2 id="modalTitle"></h2>
                <p id="modalYear"></p>
            </div>
            <div class="modal-section">
                <h3>Rating</h3>
                <div id="modalRating"></div>
            </div>
            <div class="modal-section">
                <h3>Director</h3>
                <p id="modalDirector"></p>
            </div>
            <div class="modal-section">
                <h3>Genre</h3>
                <p id="modalGenre"></p>
            </div>
            <div class="modal-section">
                <h3>Synopsis</h3>
                <p id="modalSynopsis"></p>
            </div>
            <div class="modal-section">
                <h3>Watch & Trailers</h3>
                <div class="links-container">
                    <a id="netflixLink" class="link-btn" target="_blank" style="display: none;">Watch on Netflix</a>
                    <a id="primeLink" class="link-btn" target="_blank" style="display: none;">Watch on Prime Video</a>
                    <a id="trailerLink" class="link-btn" target="_blank" style="display: none;">Watch Trailer</a>
                </div>
            </div>
        </div>
    </div>

    <footer>
        <p>🎬 Terror Vault - Where Nightmares Come to Life 🎬</p>
    </footer>

    <script>
        // Horror Movies Database
        const moviesDatabase = [
            {
                id: 1,
                title: "The Exorcist",
                year: 1973,
                rating: 8.0,
                director: "William Friedkin",
                genre: "Horror, Supernatural",

                poster: "😈",

            },
            {

                year: 1980,
                rating: 8.4,
                director: "Stanley Kubrick",
                genre: "Horror, Psychological",
                synopsis: "A family isolated in a haunted hotel during winter experiences supernatural events. A descent into madness and terror.",
                poster: "🏨",
                netflix: "",
                prime: "https://www.primevideo.com",
                trailer: "https://www.youtube.com/watch?v=aM-dq-YcVuk"
            },
            {
                id: 3,
                title: "Hereditary",
                year: 2018,
                rating: 7.6,
                director: "Ari Aster",
                genre: "Horror, Drama, Family",
                synopsis: "A family unravels after experiencing a series of unexplainable events. Disturbing, intense, and utterly horrifying.",
                poster: "👻",
                netflix: "https://www.netflix.com",
                prime: "https://www.primevideo.com",
                trailer: "https://www.youtube.com/watch?v=V6wWKNij6HE"
            },
            {
                id: 4,
                title: "The Ring",
                year: 2002,
                rating: 7.1,
                director: "Gore Verbinski",
                genre: "Horror, Mystery",
                synopsis: "A cursed videotape kills anyone who watches it within seven days. Pure nightmare fuel.",
                poster: "📺",
                netflix: "",
                prime: "https://www.primevideo.com",
                trailer: "https://www.youtube.com/watch?v=K_WzpfMqDI8"
            },
            {
                id: 5,
                title: "The Conjuring",
                year: 2013,
                rating: 7.5,
                director: "James Wan",
                genre: "Horror, Mystery, Thriller",
                synopsis: "Paranormal investigators face a malevolent spirit in a farmhouse. Terrifying supernatural scares.",
                poster: "🕷️",
                netflix: "",
                prime: "https://www.primevideo.com",
                trailer: "https://www.youtube.com/watch?v=k10ETZ41q5o"
            },
            {
                id: 6,
                title: "Insidious",
                year: 2010,
                rating: 6.8,
                director: "James Wan",
                genre: "Horror, Thriller, Mystery",
                synopsis: "A boy falls into a coma, and his astral projection becomes trapped in a haunted realm. Genuinely frightening.",
                poster: "🔴",
                netflix: "",
                prime: "https://www.primevideo.com",
                trailer: "https://www.youtube.com/watch?v=cSYm3-1axVU"
            },
            {
                id: 7,
                title: "The Sixth Sense",
                year: 1999,
                rating: 8.1,
                director: "M. Night Shyamalan",
                genre: "Horror, Drama, Thriller",
                synopsis: "A boy who communicates with ghosts helps a psychologist uncover terrifying secrets. Chilling twist ending.",
                poster: "👁️",
                netflix: "",
                prime: "https://www.primevideo.com",
                trailer: "https://www.youtube.com/watch?v=3bydB98FS_I"
            },
            {
                id: 8,
                title: "Sinister",
                year: 2012,
                rating: 7.6,
                director: "Scott Derrickson",
                genre: "Horror, Crime, Drama",
                synopsis: "A true crime writer discovers disturbing supernatural footage in his attic. Deeply unsettling and terrifying.",
                poster: "📹",
                netflix: "",
                prime: "https://www.primevideo.com",
                trailer: "https://www.youtube.com/watch?v=1rKfkSNJYAc"
            },
            {
                id: 9,
                title: "The Descent",
                year: 2005,
                rating: 7.3,
                director: "Neil Marshall",
                genre: "Horror, Adventure, Thriller",
                synopsis: "Cave explorers encounter terrifying creatures in the depths. Claustrophobic and horrifying.",
                poster: "🕳️",
                netflix: "",
                prime: "https://www.primevideo.com",
                trailer: "https://www.youtube.com/watch?v=pXYYL6SbAYA"
            },
            {
                id: 10,
                title: "The Witch",
                year: 2015,
                rating: 6.9,
                director: "Robert Eggers",
                genre: "Horror, Drama, Mystery",
                synopsis: "A Puritan family encounters supernatural terror in the woods. Atmospheric and deeply disturbing.",
                poster: "🧙",
                netflix: "https://www.netflix.com",
                prime: "https://www.primevideo.com",
                trailer: "https://www.youtube.com/watch?v=iESz_ysDYcg"
            },
            {
                id: 11,
                title: "A Quiet Place",
                year: 2018,
                rating: 7.5,
                director: "John Krasinski",
                genre: "Horror, Drama, Sci-Fi",
                synopsis: "A family must stay silent to survive deadly creatures that hunt by sound. Intense and terrifying.",
                poster: "🔇",
                netflix: "",
                prime: "https://www.primevideo.com",
                trailer: "https://www.youtube.com/watch?v=stOgc0s88Og"
            },
            {
                id: 12,
                title: "Midsommar",
                year: 2019,
                rating: 7.1,
                director: "Ari Aster",
                genre: "Horror, Drama, Mystery",
                synopsis: "A group attends a Swedish festival that becomes a nightmare. Daylight horror at its finest.",
                poster: "🌾",
                netflix: "",
                prime: "https://www.primevideo.com",
                trailer: "https://www.youtube.com/watch?v=FrgalGd6W7A"
            }
        ];

        let filteredMovies = [...moviesDatabase];

        // Initialize
        function init() {
            displayMovies(moviesDatabase);
        }

        // Display movies
        function displayMovies(movies) {
            const container = document.getElementById('moviesContainer');
            const noResults = document.getElementById('noResults');

            if (movies.length === 0) {
                container.innerHTML = '';
                noResults.style.display = 'block';
                return;
            }

            noResults.style.display = 'none';
            container.innerHTML = movies.map(movie => `
                <div class="movie-card" onclick="openModal(${movie.id})">
                    <div class="movie-poster">${movie.poster}</div>
                    <div class="movie-info">
                        <div class="movie-title">${movie.title}</div>
                        <div class="movie-year">${movie.year}</div>
                        <div class="movie-rating">
                            ${'⭐'.repeat(Math.round(movie.rating / 2))} ${movie.rating}/10
                        </div>
                        <button class="btn view-details-btn" onclick="event.stopPropagation()">View Details</button>
                    </div>
                </div>
            `).join('');
        }

        // Search functionality
        function searchMovies() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();

            if (!searchTerm) {
                filteredMovies = [...moviesDatabase];
            } else {
                filteredMovies = moviesDatabase.filter(movie =>
                    movie.title.toLowerCase().includes(searchTerm) ||
                    movie.genre.toLowerCase().includes(searchTerm) ||
                    movie.director.toLowerCase().includes(searchTerm) ||
                    movie.synopsis.toLowerCase().includes(searchTerm)
                );
            }

            displayMovies(filteredMovies);
        }

        // Reset search
        function resetSearch() {
            document.getElementById('searchInput').value = '';
            filteredMovies = [...moviesDatabase];
            displayMovies(moviesDatabase);
        }

        // Enter key search
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('searchInput').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    searchMovies();
                }
            });
        });

        // Modal functions
        function openModal(movieId) {
            const movie = moviesDatabase.find(m => m.id === movieId);
            if (!movie) return;

            document.getElementById('modalTitle').textContent = movie.title;
            document.getElementById('modalYear').textContent = `Released: ${movie.year}`;
            document.getElementById('modalRating').innerHTML = `
                <div style="font-size: 1.2em; color: #ffd700;">
                    ${'⭐'.repeat(Math.round(movie.rating / 2))} ${movie.rating}/10
                </div>
            `;
            document.getElementById('modalDirector').textContent = `Directed by: ${movie.director}`;
            document.getElementById('modalGenre').textContent = movie.genre;
            document.getElementById('modalSynopsis').textContent = movie.synopsis;

            // Setup links
            const netflixLink = document.getElementById('netflixLink');
            const primeLink = document.getElementById('primeLink');
            const trailerLink = document.getElementById('trailerLink');

            if (movie.netflix) {
                netflixLink.href = movie.netflix;
                netflixLink.style.display = 'block';
            } else {
                netflixLink.style.display = 'none';
            }

            if (movie.prime) {
                primeLink.href = movie.prime;
                primeLink.style.display = 'block';
            } else {
                primeLink.style.display = 'none';
            }

            if (movie.trailer) {
                trailerLink.href = movie.trailer;
                trailerLink.style.display = 'block';
            } else {
                trailerLink.style.display = 'none';
            }

            document.getElementById('movieModal').style.display = 'block';
        }

        // Close modal
        function closeModal() {
            document.getElementById('movieModal').style.display = 'none';
        }

        // Close modal when clicking outside
        window.onclick = function(event) {
            const modal = document.getElementById('movieModal');
            if (event.target == modal) {
                modal.style.display = 'none';
            }
        }

        // Initialize on load
        window.addEventListener('load', init);
    </script>
</body>
</html>
